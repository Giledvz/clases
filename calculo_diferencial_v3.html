<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ejercicios — Cálculo Diferencial</title>
<style>
  :root { --borde:#d0d0cc; --gris:#f5f5f3; --muted:#777; --texto:#1a1a1a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Georgia,serif; color:var(--texto); background:#fff; max-width:700px; margin:0 auto; padding:1.5rem 1.1rem 4rem; line-height:1.65; }
  .portada { margin-bottom:2rem; border-bottom:2px solid #1a4f8a; padding-bottom:1rem; }
  .portada small { font-family:Arial,sans-serif; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1a4f8a; font-weight:700; }
  .portada h1 { font-size:1.45rem; font-weight:normal; color:#1a4f8a; margin:.2rem 0 .5rem; }
  .portada p { font-family:Arial,sans-serif; font-size:13px; color:var(--muted); }
  .banner { font-family:Arial,sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#fff; padding:5px 12px; border-radius:3px; display:inline-block; margin:1.8rem 0 .9rem; }
  .card { border:1px solid var(--borde); border-radius:6px; margin-bottom:.75rem; overflow:hidden; }
  .card-header { display:flex; align-items:center; gap:10px; padding:.85rem 1rem; cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; background:#fff; }
  .card-header:active { background:var(--gris); }
  .num { font-family:Arial,sans-serif; font-size:11px; font-weight:700; color:var(--muted); min-width:22px; flex-shrink:0; }
  .enun { flex:1; }
  .enun p { font-size:15px; }
  .enun .datos { font-size:11px; color:var(--muted); margin-top:4px; border-left:2px solid var(--borde); padding-left:7px; }
  .chip { flex-shrink:0; font-family:Arial,sans-serif; font-size:12px; font-weight:700; border:1.5px solid currentColor; border-radius:4px; padding:4px 9px; background:transparent; cursor:pointer; line-height:1.3; -webkit-tap-highlight-color:transparent; }
  .chip:active { opacity:.6; }
  .panel { max-height:0; overflow:hidden; transition:max-height .25s ease; }
  .panel.open { max-height:200px; }
  .panel-inner { border-top:1px solid var(--borde); display:flex; align-items:center; justify-content:space-between; padding:.75rem 1rem .75rem 2.5rem; }
  .resp-pill { display:inline-flex; align-items:center; gap:9px; padding:7px 14px; border-radius:4px; color:#fff; }
  .resp-pill .tag { font-family:Arial,sans-serif; font-size:9px; font-weight:700; opacity:.8; text-transform:uppercase; letter-spacing:.07em; }
  .resp-pill .val { font-size:15px; font-weight:bold; }
  .ocultar { font-family:Arial,sans-serif; font-size:11px; font-weight:700; border:none; background:none; cursor:pointer; padding:0; -webkit-tap-highlight-color:transparent; }
  .footer { margin-top:2.5rem; padding-top:.75rem; border-top:1px solid var(--borde); font-family:Arial,sans-serif; font-size:11px; color:var(--muted); text-align:center; }
</style>
</head>
<body>

<div class="portada">
  <small>Ejercicios</small>
  <h1>Cálculo Diferencial</h1>
  <p>Resuelve cada ejercicio y toca <b>▸ R</b> para verificar tu respuesta.</p>
</div>

<div id="contenido"></div>
<div class="footer">Cálculo Diferencial · Universidad</div>

<script>
const SECCIONES = [

  // ── 1. Funciones y relaciones ─────────────────────────────────────────────
  { titulo:"1 · Funciones y relaciones", color:"#1a4f8a", ejercicios:[

    { n:"02", t:"Dada f(x) = 3x − 5, encuentra f(2), f(0) y f(−1).",

    { n:"05", t:"Dadas f(x) = √x y g(x) = x − 3, encuentra (f∘g)(x) y su dominio.",

    { n:"06", t:"Encuentra la inversa de f(x) = x³ + 2.",

      d:"Evalúa primero la función interior, luego la exterior",
      r:"(f∘g)(2) = 1 &nbsp;·&nbsp; (g∘f)(−1) = −3" },
    { n:"08", t:"Determina si la curva x² + y² = 9 define y como función de x. Justifica.",

  // ── 2. Dominio y rango ────────────────────────────────────────────────────
  { titulo:"2 · Dominio y rango", color:"#5b2d8e", ejercicios:[
    { n:"01", t:"Encuentra el dominio de f(x) = 1 / (x² − 4).",
      d:"Denominador ≠ 0",
      r:"Dom = ℝ − {−2, 2}" },
    { n:"02", t:"Encuentra el dominio de f(x) = √(9 − x²).",
      d:"Radicando ≥ 0",
      r:"Dom = [−3, 3]" },
    { n:"03", t:"Encuentra el dominio y rango de f(x) = |x − 2| + 1.",
      d:"Valor absoluto — mínimo en el vértice",
      r:"Dom = ℝ &nbsp;·&nbsp; Rango = [1, +∞)" },
    { n:"04", t:"Determina el dominio de f(x) = ln(x² − 5x + 6).",

    { n:"05", t:"Encuentra el rango de f(x) = −x² + 4x − 1.",

    { n:"06", t:"Encuentra el dominio de f(x) = √(x + 5) / (x − 2).",

  // ── 3. Límites ────────────────────────────────────────────────────────────
  { titulo:"3 · Límites", color:"#8a1a3a", ejercicios:[
    { n:"01", t:"Calcula: lím<sub>x→3</sub> (x² − 9) / (x − 3)",

    { n:"07", t:"Calcula: lím<sub>x→∞</sub> (2x³ − x) / (5x³ + 4x² − 1)",

    { n:"08", t:"Calcula: lím<sub>x→1</sub> (x³ − 1) / (x − 1)",

    { n:"09", t:"Calcula: lím<sub>x→0</sub> x · ln x",

    { n:"10", t:"Calcula: lím<sub>x→∞</sub> (1 + 1/x)<sup>x</sup>",
      d:"Límite fundamental de la definición de e",
      r:"e" },
  ]},

  // ── 4. Derivadas inmediatas ───────────────────────────────────────────────
  { titulo:"4 · Derivadas inmediatas", color:"#1a6e3c", ejercicios:[
    { n:"01", t:"Deriva: f(x) = 5x<sup>4</sup> − 3x<sup>3</sup> + 2x − 7",
      d:"Regla de la potencia y linealidad",
      r:"f'(x) = 20x³ − 9x² + 2" },
    { n:"02", t:"Deriva: f(x) = x<sup>2/3</sup> + 4√x",

      r:"f'(x) = (2/3)x<sup>−1/3</sup> + 2x<sup>−1/2</sup>" },
    { n:"03", t:"Deriva: f(x) = sen x − cos x + tan x",
      d:"Derivadas trigonométricas inmediatas",
      r:"f'(x) = cos x + sen x + sec²x" },
    { n:"04", t:"Deriva: f(x) = 3<sup>x</sup> + log<sub>10</sub>(x)",
      d:"Exponencial de base a y logaritmo de base a",
      r:"f'(x) = 3<sup>x</sup> · ln 3 + 1/(x · ln 10)" },
    { n:"05", t:"Deriva: f(x) = arctan(x) + arcsen(x)",
      d:"Funciones trigonométricas inversas",
      r:"f'(x) = 1/(1+x²) + 1/√(1−x²)" },
    { n:"06", t:"Deriva: f(x) = 7e<sup>x</sup> − 4 ln x + 5",
      d:"Derivadas de exponencial natural y logaritmo",
      r:"f'(x) = 7e<sup>x</sup> − 4/x" },
    { n:"07", t:"Deriva: f(x) = csc x + sec x",
      d:"Derivadas de cosecante y secante",
      r:"f'(x) = −csc x · cot x + sec x · tan x" },
    { n:"08", t:"Deriva: f(x) = x<sup>π</sup> + π<sup>x</sup>",

      d:"Derivadas de arcocoseno y arcocotangente",

  // ── 5. Producto y cociente ────────────────────────────────────────────────
  { titulo:"5 · Derivadas — producto y cociente", color:"#8a4a1a", ejercicios:[

    { n:"03", t:"Deriva: f(x) = (x² + 3) / (x − 1)",

      r:"f'(x) = (x² − 2x − 3) / (x−1)²" },
    { n:"04", t:"Deriva: f(x) = sen x / (1 + cos x)",
      d:"Regla del cociente",
      r:"f'(x) = 1 / (1 + cos x)" },
    { n:"05", t:"Deriva: f(x) = (x · ln x) / (x + 1)",
      d:"Cociente — el numerador requiere producto primero",
      r:"f'(x) = (x + ln x + 1) / (x+1)²" },
    { n:"06", t:"Deriva: f(x) = x³ · sen x",
      d:"Regla del producto",
      r:"f'(x) = 3x² sen x + x³ cos x" },
    { n:"07", t:"Deriva: f(x) = e<sup>x</sup> / (x² + 1)",
      d:"Regla del cociente",
      r:"f'(x) = e<sup>x</sup>(x−1)² / (x²+1)²" },
    { n:"08", t:"Deriva: f(x) = (x² − 1)(x² + 1)",
      d:"Producto — o expande como x<sup>4</sup> − 1 antes de derivar",
      r:"f'(x) = 4x³" },
    { n:"09", t:"Deriva: f(x) = ln x / x²",
      d:"Regla del cociente",
      r:"f'(x) = (1 − 2 ln x) / x³" },
    { n:"10", t:"Deriva: f(x) = (x + 1)(x + 2)(x + 3)",
      d:"Aplica la regla del producto dos veces o expande el polinomio",
      r:"f'(x) = 3x² + 12x + 11" },
  ]},

  // ── 6. Regla de la cadena ─────────────────────────────────────────────────
  { titulo:"6 · Derivadas — regla de la cadena", color:"#1a6e6e", ejercicios:[
    { n:"01", t:"Deriva: f(x) = (3x² + 1)<sup>5</sup>",

      r:"f'(x) = 30x(3x²+1)<sup>4</sup>" },
    { n:"02", t:"Deriva: f(x) = sen(x³ − 2x)",

    { n:"03", t:"Deriva: f(x) = e<sup>5x²−3</sup>",

    { n:"04", t:"Deriva: f(x) = ln(cos x)",

    { n:"05", t:"Deriva: f(x) = √(x² + 4x + 5)",

      d:"Cadena doble: potencia y trigonométrica con argumento 3x",

    { n:"07", t:"Deriva: f(x) = tan(x² + 1)",

  // ── 7. Derivadas implícitas ───────────────────────────────────────────────
  { titulo:"7 · Derivadas implícitas", color:"#3a5a1a", ejercicios:[
    { n:"01", t:"Encuentra dy/dx si x² + y² = 25.",

    { n:"02", t:"Encuentra dy/dx si x³ + y³ = 6xy.",

    { n:"03", t:"Analiza completamente f(x) = −x³ + 3x² + 9x − 10 y esboza su gráfica.",

    { n:"04", t:"Analiza completamente f(x) = x<sup>4</sup> − 8x² + 7 y esboza su gráfica.",
      d:"f'(x) = 4x³−16x = 4x(x−2)(x+2) · f''(x) = 12x²−16",

// ── Render ────────────────────────────────────────────────────────────────────
const root = document.getElementById('contenido');

SECCIONES.forEach(sec => {
  const banner = document.createElement('div');
  banner.className = 'banner';
  banner.style.background = sec.color;
  banner.textContent = sec.titulo;
  root.appendChild(banner);

  sec.ejercicios.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="num">${p.n}</span>
        <div class="enun">
          <p>${p.t}</p>
          <p class="datos">${p.d}</p>
        </div>
        <button class="chip" style="color:${sec.color};border-color:${sec.color}">▸ R</button>
      </div>
      <div class="panel">
        <div class="panel-inner">
          <div class="resp-pill" style="background:${sec.color}">
            <span class="tag">Respuesta</span>
            <span class="val">${p.r}</span>
          </div>
          <button class="ocultar" style="color:${sec.color}">▴ Ocultar</button>
        </div>
      </div>
    `;
    root.appendChild(card);

    const hdr     = card.querySelector('.card-header');
    const panel   = card.querySelector('.panel');
    const btn     = card.querySelector('.chip');
    const ocultar = card.querySelector('.ocultar');

    function abrir()  { panel.classList.add('open');    btn.textContent = '▾ R'; }
    function cerrar() { panel.classList.remove('open'); btn.textContent = '▸ R'; card.scrollIntoView({behavior:'smooth',block:'nearest'}); }

    hdr.addEventListener('click', e => { if (e.target===btn||e.target===ocultar) return; panel.classList.contains('open')?cerrar():abrir(); });
    btn.addEventListener('click', e => { e.stopPropagation(); panel.classList.contains('open')?cerrar():abrir(); });
    ocultar.addEventListener('click', cerrar);
  });
});
</script>
